<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#4c1d95"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="inner" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="url(#bg)"/>
  <!-- Domain expansion ring -->
  <circle cx="256" cy="256" r="220" fill="none" stroke="url(#glow)" stroke-width="4" opacity="0.5"/>
  <circle cx="256" cy="256" r="200" fill="none" stroke="#a78bfa" stroke-width="2" opacity="0.3" stroke-dasharray="12 8"/>
  <!-- Cursed energy arcs -->
  <path d="M256 56 A200 200 0 0 1 456 256" fill="none" stroke="#c4b5fd" stroke-width="6" stroke-linecap="round" opacity="0.6"/>
  <path d="M256 456 A200 200 0 0 1 56 256" fill="none" stroke="#c4b5fd" stroke-width="6" stroke-linecap="round" opacity="0.6"/>
  <!-- Inner decorative circle -->
  <circle cx="256" cy="256" r="160" fill="none" stroke="url(#inner)" stroke-width="3" opacity="0.4"/>
  <!-- JI text -->
  <text x="256" y="290" text-anchor="middle" font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif" font-weight="900" font-size="200" fill="white" letter-spacing="-8">
    JI
  </text>
  <!-- Small infinity symbol below -->
  <path d="M218 340 C218 325 238 310 256 325 C274 310 294 325 294 340 C294 355 274 370 256 355 C238 370 218 355 218 340 Z" fill="none" stroke="#e9d5ff" stroke-width="4" stroke-linecap="round" opacity="0.8"/>
  <!-- Corner accent dots -->
  <circle cx="256" cy="76" r="5" fill="#e9d5ff" opacity="0.7"/>
  <circle cx="436" cy="256" r="5" fill="#e9d5ff" opacity="0.7"/>
  <circle cx="256" cy="436" r="5" fill="#e9d5ff" opacity="0.7"/>
  <circle cx="76" cy="256" r="5" fill="#e9d5ff" opacity="0.7"/>
</svg>

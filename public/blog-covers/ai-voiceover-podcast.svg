<svg width="1200" height="675" viewBox="0 0 1200 675" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="AI Voiceovers and Podcasts for Jujutsu Infinite Content">
  <defs>
    <linearGradient id="vo-bg" x1="0" y1="0" x2="1200" y2="675" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#05030f"/>
      <stop offset="0.5" stop-color="#101a40"/>
      <stop offset="1" stop-color="#14465f"/>
    </linearGradient>
    <linearGradient id="vo-accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#67e8f9"/>
      <stop offset="1" stop-color="#06b6d4"/>
    </linearGradient>
    <radialGradient id="vo-glow" cx="0.82" cy="0.5" r="0.55">
      <stop offset="0" stop-color="#06b6d4" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#06b6d4" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#vo-bg)"/>
  <rect width="1200" height="675" fill="url(#vo-glow)"/>

  <!-- starfield -->
  <g fill="#cffafe">
    <circle cx="140" cy="90" r="2.2" opacity="0.8"/>
    <circle cx="360" cy="160" r="1.6" opacity="0.6"/>
    <circle cx="220" cy="520" r="2" opacity="0.7"/>
    <circle cx="540" cy="560" r="1.5" opacity="0.5"/>
    <circle cx="690" cy="110" r="2.4" opacity="0.8"/>
    <circle cx="95" cy="330" r="1.4" opacity="0.5"/>
    <circle cx="455" cy="70" r="1.8" opacity="0.7"/>
  </g>

  <text x="80" y="150" font-family="Segoe UI, Arial, sans-serif" font-size="26" letter-spacing="6" font-weight="700" fill="#cffafe">JUJUTSU INFINITE · CONTENT CREATION</text>
  <text x="80" y="280" font-family="Segoe UI, Arial, sans-serif" font-size="84" font-weight="800" fill="#ffffff">Give Your Guides</text>
  <text x="80" y="380" font-family="Segoe UI, Arial, sans-serif" font-size="84" font-weight="800" fill="url(#vo-accent)">a Voice</text>
  <text x="82" y="450" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="400" fill="#bae8f0">AI voiceovers &amp; podcasts from text</text>

  <!-- mic + soundwave -->
  <g transform="translate(900,300)">
    <!-- mic -->
    <g transform="translate(-110,0)">
      <rect x="-26" y="-90" width="52" height="110" rx="26" fill="#ffffff" fill-opacity="0.06" stroke="url(#vo-accent)" stroke-width="3"/>
      <path d="M -46 -10 a 46 46 0 0 0 92 0" fill="none" stroke="url(#vo-accent)" stroke-width="3"/>
      <line x1="0" y1="36" x2="0" y2="64" stroke="url(#vo-accent)" stroke-width="3"/>
      <line x1="-26" y1="64" x2="26" y2="64" stroke="url(#vo-accent)" stroke-width="3" stroke-linecap="round"/>
      <g fill="#67e8f9" fill-opacity="0.7">
        <circle cx="0" cy="-60" r="3"/>
        <circle cx="0" cy="-40" r="3"/>
        <circle cx="0" cy="-20" r="3"/>
      </g>
    </g>
    <!-- soundwave bars -->
    <g fill="url(#vo-accent)">
      <rect x="-10" y="-22" width="11" height="44" rx="5"/>
      <rect x="14"  y="-46" width="11" height="92" rx="5"/>
      <rect x="38"  y="-72" width="11" height="144" rx="5"/>
      <rect x="62"  y="-40" width="11" height="80" rx="5"/>
      <rect x="86"  y="-60" width="11" height="120" rx="5"/>
      <rect x="110" y="-30" width="11" height="60" rx="5"/>
      <rect x="134" y="-50" width="11" height="100" rx="5"/>
      <rect x="158" y="-18" width="11" height="36" rx="5"/>
    </g>
  </g>

  <text x="80" y="620" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="600" fill="#22d3ee">jujutsuinfinitecodes.app</text>
</svg>

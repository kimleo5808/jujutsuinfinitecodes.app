<svg width="1200" height="675" viewBox="0 0 1200 675" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="What Your Zodiac Sign Says About Your Playstyle">
  <defs>
    <linearGradient id="zod-bg" x1="0" y1="0" x2="1200" y2="675" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#05030f"/>
      <stop offset="0.5" stop-color="#1a1040"/>
      <stop offset="1" stop-color="#3b1466"/>
    </linearGradient>
    <linearGradient id="zod-accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f0abfc"/>
      <stop offset="1" stop-color="#a855f7"/>
    </linearGradient>
    <radialGradient id="zod-glow" cx="0.8" cy="0.5" r="0.55">
      <stop offset="0" stop-color="#a855f7" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#zod-bg)"/>
  <rect width="1200" height="675" fill="url(#zod-glow)"/>

  <!-- starfield -->
  <g fill="#e9d5ff">
    <circle cx="120" cy="90" r="2.2" opacity="0.8"/>
    <circle cx="320" cy="140" r="1.6" opacity="0.6"/>
    <circle cx="200" cy="500" r="2" opacity="0.7"/>
    <circle cx="540" cy="560" r="1.5" opacity="0.5"/>
    <circle cx="700" cy="120" r="2.4" opacity="0.8"/>
    <circle cx="160" cy="300" r="1.4" opacity="0.5"/>
    <circle cx="430" cy="80" r="1.8" opacity="0.7"/>
    <circle cx="80" cy="430" r="1.6" opacity="0.6"/>
  </g>

  <text x="80" y="150" font-family="Segoe UI, Arial, sans-serif" font-size="26" letter-spacing="6" font-weight="700" fill="#e9d5ff">JUJUTSU INFINITE · ZODIAC</text>
  <text x="80" y="280" font-family="Segoe UI, Arial, sans-serif" font-size="84" font-weight="800" fill="#ffffff">Your Sign,</text>
  <text x="80" y="380" font-family="Segoe UI, Arial, sans-serif" font-size="84" font-weight="800" fill="url(#zod-accent)">Your Playstyle</text>
  <text x="82" y="450" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="400" fill="#d8c9f0">Fire · Earth · Air · Water — find your build</text>

  <!-- zodiac wheel / constellation -->
  <g transform="translate(940,310)">
    <circle cx="0" cy="0" r="160" fill="none" stroke="#c084fc" stroke-opacity="0.25" stroke-width="2"/>
    <circle cx="0" cy="0" r="120" fill="none" stroke="#c084fc" stroke-opacity="0.35" stroke-width="2"/>
    <g stroke="#f0abfc" stroke-opacity="0.7" stroke-width="2.5" fill="#f0abfc">
      <line x1="-90" y1="-60" x2="-20" y2="10"/>
      <line x1="-20" y1="10" x2="55" y2="-35"/>
      <line x1="55" y1="-35" x2="95" y2="60"/>
      <line x1="-20" y1="10" x2="10" y2="95"/>
      <circle cx="-90" cy="-60" r="6"/>
      <circle cx="-20" cy="10" r="7"/>
      <circle cx="55" cy="-35" r="6"/>
      <circle cx="95" cy="60" r="6"/>
      <circle cx="10" cy="95" r="5"/>
    </g>
    <!-- spokes -->
    <g stroke="#c084fc" stroke-opacity="0.2" stroke-width="1.5">
      <line x1="0" y1="-160" x2="0" y2="160"/>
      <line x1="-160" y1="0" x2="160" y2="0"/>
      <line x1="-113" y1="-113" x2="113" y2="113"/>
      <line x1="113" y1="-113" x2="-113" y2="113"/>
    </g>
  </g>
  <text x="80" y="620" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="600" fill="#c084fc">jujutsuinfinitecodes.app</text>
</svg>

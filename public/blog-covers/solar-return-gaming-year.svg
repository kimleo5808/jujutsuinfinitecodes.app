<svg width="1200" height="675" viewBox="0 0 1200 675" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Plan Your Jujutsu Infinite Year with Your Solar Return Chart">
  <defs>
    <linearGradient id="sr-bg" x1="0" y1="0" x2="1200" y2="675" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#05030f"/>
      <stop offset="0.5" stop-color="#1a1040"/>
      <stop offset="1" stop-color="#3b1466"/>
    </linearGradient>
    <linearGradient id="sr-accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fde68a"/>
      <stop offset="1" stop-color="#a855f7"/>
    </linearGradient>
    <radialGradient id="sr-glow" cx="0.8" cy="0.5" r="0.55">
      <stop offset="0" stop-color="#a855f7" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="sr-sun" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#fef3c7"/>
      <stop offset="1" stop-color="#f59e0b"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#sr-bg)"/>
  <rect width="1200" height="675" fill="url(#sr-glow)"/>

  <!-- starfield -->
  <g fill="#e9d5ff">
    <circle cx="140" cy="90" r="2.2" opacity="0.8"/>
    <circle cx="360" cy="160" r="1.6" opacity="0.6"/>
    <circle cx="220" cy="520" r="2" opacity="0.7"/>
    <circle cx="540" cy="560" r="1.5" opacity="0.5"/>
    <circle cx="690" cy="110" r="2.4" opacity="0.8"/>
    <circle cx="95" cy="330" r="1.4" opacity="0.5"/>
    <circle cx="455" cy="70" r="1.8" opacity="0.7"/>
  </g>

  <text x="80" y="150" font-family="Segoe UI, Arial, sans-serif" font-size="26" letter-spacing="6" font-weight="700" fill="#e9d5ff">JUJUTSU INFINITE · YOUR YEAR AHEAD</text>
  <text x="80" y="280" font-family="Segoe UI, Arial, sans-serif" font-size="84" font-weight="800" fill="#ffffff">Plan Your</text>
  <text x="80" y="380" font-family="Segoe UI, Arial, sans-serif" font-size="84" font-weight="800" fill="url(#sr-accent)">Grind by the Stars</text>
  <text x="82" y="450" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="400" fill="#d8c9f0">A solar return chart for your gaming year</text>

  <!-- solar return chart wheel -->
  <g transform="translate(900,330)">
    <circle cx="0" cy="0" r="135" fill="#ffffff" fill-opacity="0.04" stroke="#c084fc" stroke-opacity="0.4" stroke-width="2"/>
    <circle cx="0" cy="0" r="98" fill="none" stroke="#c084fc" stroke-opacity="0.3" stroke-width="1.5"/>
    <!-- 12 house spokes -->
    <g stroke="#c084fc" stroke-opacity="0.25" stroke-width="1.5">
      <line x1="-135" y1="0" x2="135" y2="0"/>
      <line x1="0" y1="-135" x2="0" y2="135"/>
      <line x1="-117" y1="-67" x2="117" y2="67"/>
      <line x1="117" y1="-67" x2="-117" y2="67"/>
      <line x1="-67" y1="-117" x2="67" y2="117"/>
      <line x1="67" y1="-117" x2="-67" y2="117"/>
    </g>
    <!-- aspect lines -->
    <g stroke="#f0abfc" stroke-opacity="0.7" stroke-width="2" fill="#f0abfc">
      <line x1="-70" y1="-44" x2="58" y2="22"/>
      <line x1="58" y1="22" x2="20" y2="-78"/>
      <line x1="20" y1="-78" x2="-78" y2="30"/>
      <circle cx="-70" cy="-44" r="5"/>
      <circle cx="58" cy="22" r="6"/>
      <circle cx="20" cy="-78" r="5"/>
      <circle cx="-78" cy="30" r="5"/>
    </g>
    <!-- sun returning to natal position -->
    <circle cx="0" cy="-98" r="16" fill="url(#sr-sun)"/>
    <g stroke="#fcd34d" stroke-width="2.5" stroke-linecap="round">
      <line x1="0" y1="-122" x2="0" y2="-130"/>
      <line x1="17" y1="-98" x2="25" y2="-98"/>
      <line x1="-17" y1="-98" x2="-25" y2="-98"/>
      <line x1="12" y1="-110" x2="18" y2="-116"/>
    </g>
  </g>

  <text x="80" y="620" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="600" fill="#c084fc">jujutsuinfinitecodes.app</text>
</svg>

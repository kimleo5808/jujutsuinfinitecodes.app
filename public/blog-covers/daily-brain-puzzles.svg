<svg width="1200" height="675" viewBox="0 0 1200 675" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Daily Brain Puzzles for Jujutsu Infinite Players">
  <defs>
    <linearGradient id="bp-bg" x1="0" y1="0" x2="1200" y2="675" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#05030f"/>
      <stop offset="0.5" stop-color="#1a1040"/>
      <stop offset="1" stop-color="#3b1466"/>
    </linearGradient>
    <linearGradient id="bp-accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f0abfc"/>
      <stop offset="1" stop-color="#a855f7"/>
    </linearGradient>
    <radialGradient id="bp-glow" cx="0.82" cy="0.5" r="0.55">
      <stop offset="0" stop-color="#a855f7" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#bp-bg)"/>
  <rect width="1200" height="675" fill="url(#bp-glow)"/>

  <!-- starfield -->
  <g fill="#e9d5ff">
    <circle cx="140" cy="90" r="2.2" opacity="0.8"/>
    <circle cx="360" cy="160" r="1.6" opacity="0.6"/>
    <circle cx="220" cy="520" r="2" opacity="0.7"/>
    <circle cx="540" cy="560" r="1.5" opacity="0.5"/>
    <circle cx="690" cy="110" r="2.4" opacity="0.8"/>
    <circle cx="95" cy="330" r="1.4" opacity="0.5"/>
    <circle cx="455" cy="70" r="1.8" opacity="0.7"/>
  </g>

  <text x="80" y="150" font-family="Segoe UI, Arial, sans-serif" font-size="26" letter-spacing="6" font-weight="700" fill="#e9d5ff">JUJUTSU INFINITE · OFF-SCREEN TRAINING</text>
  <text x="80" y="280" font-family="Segoe UI, Arial, sans-serif" font-size="84" font-weight="800" fill="#ffffff">Sharpen Your</text>
  <text x="80" y="380" font-family="Segoe UI, Arial, sans-serif" font-size="84" font-weight="800" fill="url(#bp-accent)">Mind Daily</text>
  <text x="82" y="450" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="400" fill="#d8c9f0">Brain games for the downtime between spins</text>

  <!-- crossword grid -->
  <g transform="translate(880,200)">
    <g stroke="#c084fc" stroke-opacity="0.4" stroke-width="2">
      <!-- cells: filled (dark) and open (light) -->
      <rect x="0"   y="0"   width="55" height="55" fill="#ffffff" fill-opacity="0.06"/>
      <rect x="55"  y="0"   width="55" height="55" fill="#a855f7" fill-opacity="0.25"/>
      <rect x="110" y="0"   width="55" height="55" fill="#ffffff" fill-opacity="0.06"/>
      <rect x="165" y="0"   width="55" height="55" fill="#ffffff" fill-opacity="0.06"/>

      <rect x="0"   y="55"  width="55" height="55" fill="#ffffff" fill-opacity="0.06"/>
      <rect x="55"  y="55"  width="55" height="55" fill="#ffffff" fill-opacity="0.06"/>
      <rect x="110" y="55"  width="55" height="55" fill="#a855f7" fill-opacity="0.25"/>
      <rect x="165" y="55"  width="55" height="55" fill="#ffffff" fill-opacity="0.06"/>

      <rect x="0"   y="110" width="55" height="55" fill="#a855f7" fill-opacity="0.25"/>
      <rect x="55"  y="110" width="55" height="55" fill="#ffffff" fill-opacity="0.06"/>
      <rect x="110" y="110" width="55" height="55" fill="#ffffff" fill-opacity="0.06"/>
      <rect x="165" y="110" width="55" height="55" fill="#ffffff" fill-opacity="0.06"/>

      <rect x="0"   y="165" width="55" height="55" fill="#ffffff" fill-opacity="0.06"/>
      <rect x="55"  y="165" width="55" height="55" fill="#ffffff" fill-opacity="0.06"/>
      <rect x="110" y="165" width="55" height="55" fill="#ffffff" fill-opacity="0.06"/>
      <rect x="165" y="165" width="55" height="55" fill="#a855f7" fill-opacity="0.25"/>
    </g>
    <!-- filled-in letters -->
    <g font-family="Segoe UI, Arial, sans-serif" font-size="32" font-weight="800" fill="url(#bp-accent)" text-anchor="middle">
      <text x="27"  y="38">C</text>
      <text x="137" y="38">U</text>
      <text x="192" y="38">E</text>
      <text x="27"  y="148">R</text>
      <text x="82"  y="203">S</text>
      <text x="137" y="203">E</text>
    </g>
  </g>

  <text x="80" y="620" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="600" fill="#c084fc">jujutsuinfinitecodes.app</text>
</svg>
